version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    # ports:
    #   - '4005:3003' // hide app (below use nginx to receive req firsr)
    expose:
      - '3003'
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15
    restart: always
    env_file:
      - .env.prod
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redisdata:/data

  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
    depends_on:
      - app
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  redisdata:
