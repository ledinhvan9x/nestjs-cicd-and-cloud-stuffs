name: NestJS CI CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: RENDER_STAGING_HOOK
    steps:
      - run: curl -X POST ${{ secrets.RENDER_STAGING_HOOK_IMAGE_BASED }}

  deploy-prod:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: RENDER_PROD_HOOK
    steps:
      - run: curl -X POST ${{ secrets.RENDER_PROD_HOOK_IMAGE_BASED }}
