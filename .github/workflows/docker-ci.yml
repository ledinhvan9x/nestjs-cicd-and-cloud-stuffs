name: Docker CI/CD

on:
  push:
    branches: [main, staging]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tags
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          if [ "${GITHUB_REF##*/}" = "main" ]; then
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          fi

          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Login to GHCR
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -f Dockerfile.prod \
            -t ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }} \
            -t ghcr.io/${{ github.repository }}:${{ env.SHORT_SHA }} \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}
          docker push ghcr.io/${{ github.repository }}:${{ env.SHORT_SHA }}
